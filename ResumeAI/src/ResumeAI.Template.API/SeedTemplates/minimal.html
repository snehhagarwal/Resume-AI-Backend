<div class="minimal-mono">
    <div class="header">
        <h1>{{FullName}}</h1>
        <p>{{TargetJobTitle}} | {{Email}} | {{Phone}}</p>
    </div>

    <div class="content-block">
        <h3>Summary</h3>
        <div class="text">{{SUMMARY}}</div>
    </div>

    <div class="content-block">
        <h3>Experience</h3>
        <div class="text">{{EXPERIENCE}}</div>
    </div>

    <div class="content-block">
        <h3>Education</h3>
        <div class="text">{{EDUCATION}}</div>
    </div>

    <div class="content-block">
        <h3>Skills</h3>
        <div class="text">{{SKILLS}}</div>
    </div>

    <div class="content-block">
        <h3>Projects</h3>

    <div class="content-block">
