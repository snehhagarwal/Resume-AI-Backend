<!DOCTYPE html>
<html>
<body>
    <table width="100%" border="0" cellspacing="0" cellpadding="0" style="min-height: 1000px;">
        <tr>
            <!-- Narrow Neon Bar -->
            <td width="80px" valign="top" bgcolor="#121212" style="text-align: center; padding-top: 40px;">
                <div style="color: #00ffcc; font-size: 20pt; font-weight: 900; border: 3px solid #00ffcc; width: 50px; margin: 0 auto 30px auto; padding: 10px;">
                    RA
                </div>
                <div style="color: #00ffcc; opacity: 0.5; font-size: 10pt; text-transform: uppercase; letter-spacing: 5px; transform: rotate(270deg); margin-top: 100px; white-space: nowrap;">
                    CREATIVE RESUME
                </div>
            </td>

            <!-- Main Content -->
            <td valign="top" style="padding: 50px; background: #ffffff;">
                <header>
                    <h1 style="font-size: 36pt; margin: 0; color: #121212; font-weight: 900;">{{FullName}}</h1>
                    <h3 style="color: #ff0066; text-transform: uppercase; letter-spacing: 3px; font-size: 14pt; margin-top: 5px;">{{TargetJobTitle}}</h3>
                    <p style="font-size: 10pt; color: #666;">{{Email}} | {{Phone}}</p>
                </header>

                <div style="margin-top: 40px;">
                    <section class="neon-section">
                        <div style="font-size: 10pt; color: #999; text-transform: uppercase; letter-spacing: 2px; border-left: 4px solid #ff0066; padding-left: 10px; margin-bottom: 10px;">Summary</div>
                        <div style="font-size: 10pt; line-height: 1.6; color: #444; white-space: pre-wrap;">{{SUMMARY}}</div>
                    </section>

                    <section class="neon-section" style="margin-top: 30px;">
                        <div style="font-size: 10pt; color: #999; text-transform: uppercase; letter-spacing: 2px; border-left: 4px solid #00ffcc; padding-left: 10px; margin-bottom: 10px;">Experience</div>
                        <div style="font-size: 10pt; line-height: 1.6; color: #444; white-space: pre-wrap;">{{EXPERIENCE}}</div>
                    </section>

                    <section class="neon-section" style="margin-top: 30px;">
                        <div style="font-size: 10pt; color: #999; text-transform: uppercase; letter-spacing: 2px; border-left: 4px solid #ff0066; padding-left: 10px; margin-bottom: 10px;">Education</div>
                        <div style="font-size: 10pt; line-height: 1.6; color: #444; white-space: pre-wrap;">{{EDUCATION}}</div>
                    </section>

                    <table width="100%" style="margin-top: 30px;">
                        <tr>
                            <td width="50%" valign="top">
                                <div style="font-size: 10pt; color: #999; text-transform: uppercase; letter-spacing: 2px; border-left: 4px solid #00ffcc; padding-left: 10px; margin-bottom: 10px;">Skills</div>
                                <div style="font-size: 10pt; line-height: 1.6; color: #444; white-space: pre-wrap;">{{SKILLS}}</div>
                            </td>
                            <td width="50%" valign="top">
                                <div style="font-size: 10pt; color: #999; text-transform: uppercase; letter-spacing: 2px; border-left: 4px solid #ff0066; padding-left: 10px; margin-bottom: 10px;">Projects</div>
                                <div style="font-size: 10pt; line-height: 1.6; color: #444; white-space: pre-wrap;">{{PROJECTS}}</div>
                            </td>
                        </tr>
                    </table>
                </div>
            </td>
        </tr>
    </table>
</body>
</html>
