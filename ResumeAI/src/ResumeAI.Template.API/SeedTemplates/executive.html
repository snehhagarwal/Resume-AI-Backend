<!DOCTYPE html>
<html>
<body>
    <div style="font-family: 'Georgia', serif; color: #111; padding: 40px;">
        <table width="100%" border="0" cellspacing="0" cellpadding="0" style="border-bottom: 3px solid #003366; padding-bottom: 20px; margin-bottom: 30px;">
            <tr>
                <td valign="top">
                    <h1 style="font-size: 28pt; margin: 0; color: #003366; text-transform: uppercase;">{{FullName}}</h1>
                    <div style="font-size: 14pt; color: #555; margin: 5px 0;">{{TargetJobTitle}}</div>
                </td>
                <td valign="top" align="right" style="font-size: 10pt; color: #333;">
                    <div>{{Email}}</div>
                    <div>{{Phone}}</div>
                </td>
            </tr>
        </table>

        <section style="margin-bottom: 25px;">
            <h2 style="font-family: Arial; font-size: 11pt; text-transform: uppercase; color: #003366; background: #f0f4f8; padding: 5px 10px; border-left: 5px solid #003366; margin-bottom: 12px;">Summary</h2>
            <div style="font-size: 11pt; line-height: 1.6; white-space: pre-wrap; padding-left: 10px;">{{SUMMARY}}</div>
        </section>

        <section style="margin-bottom: 25px;">
            <h2 style="font-family: Arial; font-size: 11pt; text-transform: uppercase; color: #003366; background: #f0f4f8; padding: 5px 10px; border-left: 5px solid #003366; margin-bottom: 12px;">Experience</h2>
            <div style="font-size: 11pt; line-height: 1.6; white-space: pre-wrap; padding-left: 10px;">{{EXPERIENCE}}</div>
        </section>

        <section style="margin-bottom: 25px;">
            <h2 style="font-family: Arial; font-size: 11pt; text-transform: uppercase; color: #003366; background: #f0f4f8; padding: 5px 10px; border-left: 5px solid #003366; margin-bottom: 12px;">Education</h2>
            <div style="font-size: 11pt; line-height: 1.6; white-space: pre-wrap; padding-left: 10px;">{{EDUCATION}}</div>
        </section>

        <table width="100%">
            <tr>
                <td width="50%" valign="top">
                    <h2 style="font-family: Arial; font-size: 11pt; text-transform: uppercase; color: #003366; background: #f0f4f8; padding: 5px 10px; border-left: 5px solid #003366; margin-bottom: 12px;">Skills</h2>
                    <div style="font-size: 11pt; line-height: 1.6; white-space: pre-wrap; padding-left: 10px;">{{SKILLS}}</div>
                </td>
                <td width="50%" valign="top" style="padding-left: 20px;">
                    <h2 style="font-family: Arial; font-size: 11pt; text-transform: uppercase; color: #003366; background: #f0f4f8; padding: 5px 10px; border-left: 5px solid #003366; margin-bottom: 12px;">Projects</h2>
                    <div style="font-size: 11pt; line-height: 1.6; white-space: pre-wrap; padding-left: 10px;">{{PROJECTS}}</div>
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
