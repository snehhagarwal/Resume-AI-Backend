version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "9432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "9379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "9672:5672"
      - "19672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_VM_MEMORY_HIGH_WATERMARK_RELATIVE: 0.7

  auth:
    build:
      context: .
      dockerfile: src/ResumeAI.Auth.API/Dockerfile
    ports:
      - "9001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__AuthDb: "Host=postgres;Database=resumeai_auth;Username=postgres;Password=${POSTGRES_PASSWORD};"
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__Issuer: ResumeAI
      Jwt__Audience: ResumeAI-Clients
      OAuth__Google__ClientId: "${GOOGLE_CLIENT_ID}"
      OAuth__Google__ClientSecret: "${GOOGLE_CLIENT_SECRET}"
      OAuth__LinkedIn__ClientId: "${LINKEDIN_CLIENT_ID}"
      OAuth__LinkedIn__ClientSecret: "${LINKEDIN_CLIENT_SECRET}"
    depends_on:
      - postgres

  resume:
    build:
      context: .
      dockerfile: src/ResumeAI.Resume.API/Dockerfile
    ports:
      - "9002:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__ResumeDb: "Host=postgres;Database=resumeai_resume;Username=postgres;Password=${POSTGRES_PASSWORD};"
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__Issuer: ResumeAI
      Jwt__Audience: ResumeAI-Clients
    depends_on:
      - postgres

  section:
    build:
      context: .
      dockerfile: src/ResumeAI.Section.API/Dockerfile
    ports:
      - "9003:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__SectionDb: "Host=postgres;Database=resumeai_section;Username=postgres;Password=${POSTGRES_PASSWORD};"
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__Issuer: ResumeAI
      Jwt__Audience: ResumeAI-Clients
    depends_on:
      - postgres

  ai:
    build:
      context: .
      dockerfile: src/ResumeAI.AI.API/Dockerfile
    ports:
      - "9004:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__AiDb: "Host=postgres;Database=resumeai_ai;Username=postgres;Password=${POSTGRES_PASSWORD};"
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__Issuer: ResumeAI
      Jwt__Audience: ResumeAI-Clients
      Redis__ConnectionString: "redis:6379"
      OpenAI__ApiKey: "${OPENAI_API_KEY}"
      OpenAI__Endpoint: "https://api.groq.com/openai/v1"
      OpenAI__ModelName: "llama-3.3-70b-versatile"
      InternalServices__ResumeApiBaseUrl: "http://resume:8080"
      InternalServices__SectionApiBaseUrl: "http://section:8080"
      Services__NotificationBaseUrl: "http://notification:8080"
    depends_on:
      - postgres
      - redis

  template:
    build:
      context: .
      dockerfile: src/ResumeAI.Template.API/Dockerfile
    ports:
      - "9005:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__TemplateDb: "Host=postgres;Database=resumeai_template;Username=postgres;Password=${POSTGRES_PASSWORD};"
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__Issuer: ResumeAI
      Jwt__Audience: ResumeAI-Clients
    depends_on:
      - postgres

  export:
    build:
      context: .
      dockerfile: src/ResumeAI.Export.API/Dockerfile
    ports:
      - "9006:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__ExportDb: "Host=postgres;Database=resumeai_export;Username=postgres;Password=${POSTGRES_PASSWORD};"
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__Issuer: ResumeAI
      Jwt__Audience: ResumeAI-Clients
      RabbitMQ__Host: rabbitmq
      Services__TemplateApi: "http://template:8080"
      Services__ResumeApi: "http://resume:8080"
      Services__SectionApi: "http://section:8080"
      Services__AuthApi: "http://auth:8080"
      Services__NotificationBaseUrl: "http://notification:8080"
      Redis__ConnectionString: "redis:6379"
    depends_on:
      - postgres
      - rabbitmq
      - redis

  jobmatch:
    build:
      context: .
      dockerfile: src/ResumeAI.JobMatch.API/Dockerfile
    ports:
      - "9007:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__JobMatchDb: "Host=postgres;Database=resumeai_jobmatch;Username=postgres;Password=${POSTGRES_PASSWORD};"
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__Issuer: ResumeAI
      Jwt__Audience: ResumeAI-Clients
      Services__AiServiceUrl: "http://ai:8080"
      Services__NotificationBaseUrl: "http://notification:8080"
    depends_on:
      - postgres

  notification:
    build:
      context: .
      dockerfile: src/ResumeAI.Notification.API/Dockerfile
    ports:
      - "9008:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__NotificationDb: "Host=postgres;Database=resumeai_notification;Username=postgres;Password=${POSTGRES_PASSWORD};"
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__Issuer: ResumeAI
      Jwt__Audience: ResumeAI-Clients
      RabbitMQ__Host: rabbitmq
    depends_on:
      - postgres
      - rabbitmq

  gateway:
    build:
      context: .
      dockerfile: src/ResumeAI.Gateway/Dockerfile
    ports:
      - "9000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__Issuer: ResumeAI
      Jwt__Audience: ResumeAI-Clients
      ReverseProxy__Clusters__auth-cluster__Destinations__auth1__Address: "http://auth:8080"
      ReverseProxy__Clusters__resume-cluster__Destinations__resume1__Address: "http://resume:8080"
      ReverseProxy__Clusters__section-cluster__Destinations__section1__Address: "http://section:8080"
      ReverseProxy__Clusters__ai-cluster__Destinations__ai1__Address: "http://ai:8080"
      ReverseProxy__Clusters__template-cluster__Destinations__template1__Address: "http://template:8080"
      ReverseProxy__Clusters__export-cluster__Destinations__export1__Address: "http://export:8080"
      ReverseProxy__Clusters__jobmatch-cluster__Destinations__jobmatch1__Address: "http://jobmatch:8080"
      ReverseProxy__Clusters__notification-cluster__Destinations__notification1__Address: "http://notification:8080"
    depends_on:
      - auth
      - resume
      - section
      - ai
      - template
      - export
      - jobmatch
      - notification



volumes:
  postgres_data:


